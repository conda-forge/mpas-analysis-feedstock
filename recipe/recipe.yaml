schema_version: 1

context:
  name: MPAS-Analysis
  version: 1.14.0

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/MPAS-Dev/${{ name }}/archive/${{ version }}.tar.gz
  sha256: f27ba28a4eab0911061e3c45c3b8ef37703ff325b302b8babfeaece94171f073

build:
  number: 2
  noarch: python
  script: ${{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv
  python:
    entry_points:
      - mpas_analysis = mpas_analysis.__main__:main
      - download_analysis_data = mpas_analysis.download_data:download_analysis_data

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=60
  run:
    - python >=${{ python_min }}
    - cartopy >=0.18.0
    - cartopy_offlinedata
    - cmocean
    - dask
    - esmf >=8.4.2,<9.0.0
    - f90nml
    - geometric_features >=1.6.1
    - gsw
    - lxml
    - mache >=1.11.0
    - matplotlib-base >=3.9.0
    - mpas_tools >=1.3.0,<2.0.0
    - nco >=4.8.1,!=5.2.6
    - netcdf4
    - numpy >=2.0,<3.0
    - pandas
    - pillow >=10.0.0,<11.0.0
    - progressbar2
    - pyproj
    - pyremap >=2.0.0,<3.0.0
    - python-dateutil
    - requests
    - scipy >=1.7.0
    - setuptools
    - shapely >=2.0,<3.0
    - tranche >=0.2.3
    - xarray >=0.14.1

tests:
  - python:
      imports:
        - mpas_analysis
      pip_check: true
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pytest
        - python ${{ python_min }}.*
    script:
      - pytest --pyargs mpas_analysis
      - mpas_analysis --help
      - mpas_analysis --list
      - mpas_analysis --plot_colormaps
      - download_analysis_data --help

about:
  license: BSD-3-Clause
  license_file: LICENSE
  summary: Analysis of MPAS-Ocean and MPAS-Seaice simulations results
  description: |
    Analysis for simulations produced with Model for Prediction Across Scales
    (MPAS) components and the Energy Exascale Earth System Model (E3SM), which
    used those components.
  homepage: https://github.com/MPAS-Dev/MPAS-Analysis
  repository: https://github.com/MPAS-Dev/MPAS-Analysis
  documentation: https://mpas-dev.github.io/MPAS-Analysis/stable/

extra:
  recipe-maintainers:
    - andrewdnolan
    - xylar
    - jhkennedy
